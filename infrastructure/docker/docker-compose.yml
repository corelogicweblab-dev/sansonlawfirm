services:
  postgres:
    image: postgres:16-alpine
    container_name: sanson-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sanson}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sanson_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sanson_legal}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sanson} -d ${POSTGRES_DB:-sanson_legal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanson-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sanson-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6335}:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  minio:
    image: minio/minio:latest
    container_name: sanson-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sanson_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sanson_minio_secret}
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: sanson-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8100}:8100"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sanson:sanson_dev_password@postgres:5432/sanson_legal
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: sanson-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3100}:3100"
    env_file:
      - ../../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
