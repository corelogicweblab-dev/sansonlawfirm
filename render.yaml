# =============================================================================
# RENDER = API ONLY (Docker). Do NOT deploy Next.js here — use Netlify for web.
# =============================================================================
# In Render Dashboard: delete old Node/static services; use Blueprint OR:
#   Environment: Docker
#   Dockerfile Path: backend/Dockerfile
#   Docker Context: backend
# =============================================================================

services:
  - type: web
    name: sansonlawfirm
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: SUPABASE_URL
        value: "https://zoauzxvkjthgokjurkze.supabase.co"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://sansonlawfirm.netlify.app,http://localhost:3100"
      - key: OPENAI_API_KEY
        sync: false
