# Render API — root folder: backend/
services:
  - type: web
    name: sansonlawfirm
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: SUPABASE_URL
        value: "https://zoauzxvkjthgokjurkze.supabase.co"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://sansonlawfirm.netlify.app,http://localhost:3100"
