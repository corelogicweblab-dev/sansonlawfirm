# SANSON Legal OS — Netlify (frontend) + Render (API)
# API: https://sansonlawfirm.onrender.com

[build]
  command = "npm ci && npm run build --workspace=@sanson/web"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  NEXT_PUBLIC_API_URL = "https://sansonlawfirm.onrender.com"
  NEXT_PUBLIC_WS_URL = "wss://sansonlawfirm.onrender.com"
  NEXT_PUBLIC_APP_NAME = "SANSON Legal OS"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
