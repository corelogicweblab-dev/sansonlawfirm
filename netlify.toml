# SANSON Legal OS — Netlify (monorepo root build)
# UI: CLEAR Build command + Publish directory. Package directory: apps/web (optional)
# API: https://sansonlawfirm.onrender.com

[build]
  installCommand = "npm ci"
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  NEXT_PUBLIC_API_URL = "https://sansonlawfirm.onrender.com"
  NEXT_PUBLIC_WS_URL = "wss://sansonlawfirm.onrender.com"
  NEXT_PUBLIC_APP_NAME = "SANSON Legal OS"
  NEXT_PUBLIC_SUPABASE_URL = "https://zoauzxvkjthgokjurkze.supabase.co"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
