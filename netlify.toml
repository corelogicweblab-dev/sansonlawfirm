# SANSON Legal OS — Netlify deploys apps/web ONLY (not apps/mobile)
# API: https://sansonlawfirm.onrender.com

[build]
  # Critical: point Netlify at the Next.js app (fixes apps/mobile/dist error)
  base = "apps/web"
  command = "cd ../.. && npm ci && npm run build --workspace=@sanson/web"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  NEXT_PUBLIC_API_URL = "https://sansonlawfirm.onrender.com"
  NEXT_PUBLIC_WS_URL = "wss://sansonlawfirm.onrender.com"
  NEXT_PUBLIC_APP_NAME = "SANSON Legal OS"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
